<mat-sidenav-container class="layout-shell">
  <mat-sidenav class="layout-sidenav" mode="side" opened>
    <div class="sidenav-branding">
      <div class="brand-mark">NodeScope</div>
      <div class="brand-tag">IT · OT ingestion</div>
    </div>

    <mat-nav-list role="navigation" aria-label="Primary application sections" class="sidenav-nav">
      <a mat-list-item routerLink="/dashboard" routerLinkActive="is-active">
        <span matListItemTitle>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/projects" routerLinkActive="is-active">
        <span matListItemTitle>Projects</span>
      </a>
      <a mat-list-item routerLink="/operations" routerLinkActive="is-active">
        <span matListItemTitle>Operaciones</span>
      </a>
      <mat-divider class="sidenav-divider" />
      <a mat-list-item routerLink="/account" routerLinkActive="is-active">
        <span matListItemTitle>Cuenta</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="layout-content">
    <mat-toolbar color="primary" class="toolbar">
      <span class="toolbar-title">Workspace</span>

      <span class="toolbar-spacer"></span>

      <a
        mat-button
        class="toolbar-account"
        routerLink="/account"
        [attr.title]="currentUser()?.email ?? 'Cuenta y sesión'"
      >
        @if (currentUser(); as operator) {
          {{ operator.displayName }}
        } @else {
          Cuenta
        }
      </a>
      <button type="button" mat-button class="toolbar-signout" (click)="logout()">Cerrar sesión</button>
    </mat-toolbar>

    <main class="layout-main" role="main">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
